services:
  postgres:
    image: postgres:16
    container_name: payment-postgres
    environment:
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_pass
      POSTGRES_DB: payment_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_user"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: >
      postgres -c max_connections=200 -c shared_buffers=256MB
      -c effective_cache_size=1GB -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9 -c wal_buffers=16MB
      -c default_statistics_target=100 -c random_page_cost=1.1

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8080:8080"
    mem_limit: 4g
    mem_reservation: 2g
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_db
      SPRING_DATASOURCE_USERNAME: payment_user
      SPRING_DATASOURCE_PASSWORD: payment_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: payment-service
      JVM_OPTS: >
        -XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=75.0
        -XX:+UseZGC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=10
        -Djava.net.preferIPv4Stack=true
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    depends_on:
      - mimir
      - loki
      - tempo

  mimir:
    image: grafana/mimir:latest
    container_name: lgtm-mimir
    command: ["-config.file=/etc/mimir.yaml"]
    ports:
      - "9009:9009"
    volumes:
      - ./benchmark/lgtm/mimir.yaml:/etc/mimir.yaml:ro
      - mimir_data:/data
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: lgtm-loki
    ports:
      - "3100:3100"
    command: "-config.file=/etc/loki/local-config.yaml"
    restart: unless-stopped

  tempo:
    image: grafana/tempo:latest
    container_name: lgtm-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: lgtm-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_INSTALL_PLUGINS: ""
    ports:
      - "3000:3000"
    volumes:
      - ./benchmark/grafana/lgtm-datasources.yaml:/etc/grafana/provisioning/datasources/lgtm.yaml:ro
      - ./benchmark/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - mimir
      - loki
      - tempo

volumes:
  postgres_data:
  mimir_data:
  tempo_data:
  grafana_data:
