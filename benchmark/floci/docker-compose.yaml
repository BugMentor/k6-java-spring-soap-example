services:
  floci:
    image: floci/floci:latest
    container_name: floci-eks-simulator
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      - FLOCI_HOSTNAME=floci
      - FLOCI_DEFAULT_REGION=us-east-1
      - FLOCI_STORAGE_MODE=memory
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
    networks:
      - floci-eks

  registry:
    image: registry:2
    container_name: floci-registry
    ports:
      - "5000:5000"
    networks:
      - floci-eks

networks:
  floci-eks:
    name: floci-eks-network
    driver: bridge
