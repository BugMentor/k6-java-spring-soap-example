name: CI - Payment Service

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: -Xmx1024m

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Run Unit Tests (H2)
        run: mvn test -Dspring.profiles.active=test -Dtest="com.enterprise.payment.domain.model.*Test,com.enterprise.payment.application.usecase.*Test,com.example.users.domain.model.*Test,com.example.users.application.usecase.*Test"

      - name: Run H2 Integration Tests
        run: mvn test -Dspring.profiles.active=test -Dtest="*H2IntegrationTest,*Test"

      - name: Verify Compilation
        run: mvn clean compile -q

      - name: Build Package
        run: mvn package -DskipTests -q

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maven-artifacts
          path: target/*.jar

  code-coverage:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Run Tests with Coverage
        run: mvn verify -Pcoverage -Dspring.profiles.active=test
        continue-on-error: true

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: payment-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Image Builds
        run: |
          docker images | grep payment-service

  quality-checks:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Check Formatting (spotless)
        run: mvn spotless:check -q
        continue-on-error: true

      - name: Run PMD Analysis
        run: mvn pmd:pmd -q
        continue-on-error: true

      - name: Run SpotBugs
        run: mvn spotbugs:spotbugs -q
        continue-on-error: true

  notify:
    runs-on: ubuntu-latest
    needs: [build, code-coverage, docker-build, quality-checks]
    if: always()
    
    steps:
      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage: ${{ needs.code-coverage.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Docker: ${{ needs.docker-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Quality: ${{ needs.quality-checks.result }}" >> $GITHUB_STEP_SUMMARY